# sensor.cfg — example configuration file
# Loaded with: ./hal_demo config=sensor.cfg
# All values can also be overridden inline: ./hal_demo mode=hardware kind=gps

# "simulated" or "hardware"
mode = simulated

# "gps", "video", or "imu"
kind = gps

# Simulated-mode settings
# Leave sim_file blank to use the built-in synthetic generator
sim_file =
sim_num_samples = 12

# Hardware-mode settings (ignored when mode=simulated)
hw_device = /dev/ttyUSB0
hw_baud   = 9600
hw_width  = 640
hw_height = 480
hw_fps    = 30

# Nominal output rate in Hz (used by pipeline scheduler)
rate_hz = 5
